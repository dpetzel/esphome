name: Compile ESPHome Firmware

on:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:stable
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy secrets
        run: |
          cat > config/secrets.yaml << 'EOF'
          wifi_ssid: "dummy-ssid"
          wifi_password: "dummy-password"
          wifi_fallback_ap_password: "dummy-password"
          home_assistant_api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          EOF

      - name: Compile all configs
        run: |
          for yaml in config/*.yaml; do
            [ "$yaml" = "config/secrets.yaml" ] && continue
            name=$(basename "$yaml" .yaml)
            echo "=== Compiling $name ==="
            esphome compile "$yaml"
          done
