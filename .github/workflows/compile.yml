name: Compile ESPHome Firmware

on:
  push:
    branches: [main]
    paths-ignore:
      - 'components/**'
      - '*.md'
      - '.kiro/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'components/**'
      - '*.md'
      - '.kiro/**'

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.find.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          configs=$(ls config/*.yaml | grep -v secrets | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  compile:
    needs: list
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:stable
    strategy:
      matrix:
        config: ${{ fromJson(needs.list.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy secrets
        run: |
          cat > config/secrets.yaml << 'EOF'
          wifi_ssid: "dummy-ssid"
          wifi_password: "dummy-password"
          wifi_fallback_ap_password: "dummy-password"
          home_assistant_api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          EOF

      - name: Compile
        run: esphome compile "${{ matrix.config }}"
