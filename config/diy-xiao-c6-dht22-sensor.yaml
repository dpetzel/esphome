substitutions:
  name: diy-xiao-c6-dht22-sensor
  friendly_name: DIY Xiao C6 DHT22 Sensor

esphome:
  name: "${name}"
  name_add_mac_suffix: true
  friendly_name: "${friendly_name}"
  on_boot:
    - text_sensor.template.publish:
        id: temp_sensor_module_model
        state: "DHT22"
    - text_sensor.template.publish:
        id: temp_sensor_mcu_model
        state: "ESP32 Xiao C6"

packages:
  - !include common/base.yaml
  - !include common/wifi.yaml
  - !include boards/esp32-xiao-c6.yaml

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 1min

wifi:
  on_connect:
    - delay: 5s
    - deep_sleep.enter: deep_sleep_1

sensor:
  - platform: dht
    pin:
      number: GPIO21
      mode:
        input: true
        # My DHT22 module has a built-in pull-up resistor, so I disable the internal pull-up
        pullup: false
    model: DHT22_TYPE2
    temperature:
      name: "Temperature"
      force_update: false
    humidity:
      name: "Humidity"
      force_update: false
    update_interval: 5s
  
  - platform: wifi_signal
    id: !extend wifi_signal_strength
    update_interval: never
  
  - platform: adc
    id: !extend battery_voltage
    update_interval: never

text_sensor:
  - platform: template
    name: Sensor Module
    id: temp_sensor_module_model
    icon: "mdi:thermometer"
    entity_category: "diagnostic"
    update_interval: never

  - platform: template
    name: Microcontroller
    id: temp_sensor_mcu_model
    icon: "mdi:chip"
    entity_category: "diagnostic"
    update_interval: never

# References
# https://tutoduino.fr/en/esp32c6-temperature-esphome/